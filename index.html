<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宋宵因的小栈</title>
    <!-- 引入 Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; height: 100vh; background-color: #f9f9f9; }
        
        /* 左侧侧边栏样式 */
        #sidebar {
            width: 260px;
            background-color: #fff;
            border-right: 1px solid #e1e4e8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .site-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #24292e;
            padding-bottom: 10px;
            border-bottom: 1px solid #e1e4e8;
        }
        .menu-item {
            padding: 10px 15px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 6px;
            color: #586069;
            transition: all 0.2s;
            font-size: 15px;
        }
        .menu-item:hover { background-color: #f1f8ff; color: #0366d6; }
        .menu-item.active { background-color: #0366d6; color: white; }

        /* 右侧内容区域样式 */
        #main-content {
            flex-grow: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background-color: #fff;
        }
        #article-title { margin-top: 0; border-bottom: 1px solid #e1e4e8; padding-bottom: 10px; }
        #article-body { line-height: 1.6; color: #24292e; font-size: 16px; }
        
        /* 简单的 Markdown 样式 */
        #article-body img { max-width: 100%; }
        #article-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
        #article-body code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e1e4e8; padding: 10px; box-sizing: border-box; }
            #main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- 左侧菜单 -->
    <div id="sidebar">
        <div class="site-title">宋宵因的小栈</div>
        <div id="menu-list">
            <!-- 菜单项会通过 JS 自动生成 -->
        </div>
    </div>

    <!-- 右侧文章 -->
    <div id="main-content">
        <h1 id="article-title">欢迎来到我的小栈</h1>
        <div id="article-body">
            <p>请点击左侧菜单查看文章。</p>
        </div>
    </div>

    <script>
        // ================= 配置区域 (在这里编辑你的文章列表) =================
        const articles = [
            { title: "文章标题1", file: "post1.md" },
            { title: "文章标题2", file: "post2.md" },
            // 想加新文章？复制上面一行，修改 title 和 file 即可
        ];
        // ===================================================================

        const menuList = document.getElementById('menu-list');
        const titleEl = document.getElementById('article-title');
        const bodyEl = document.getElementById('article-body');

        // 初始化菜单
        articles.forEach((article, index) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerText = article.title;
            div.onclick = () => loadArticle(index, div);
            menuList.appendChild(div);
        });

        // 加载文章函数
        async function loadArticle(index, element) {
            // 更新菜单高亮
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            const article = articles[index];
            titleEl.innerText = article.title;
            bodyEl.innerHTML = '<p>加载中...</p>';

            try {
                const response = await fetch(article.file);
                if (!response.ok) throw new Error('文件未找到');
                const text = await response.text();
                // 使用 marked 库将 markdown 转换为 html
                bodyEl.innerHTML = marked.parse(text);
            } catch (error) {
                bodyEl.innerHTML = `<p style="color:red">无法加载文章：${article.file}<br>请确保该文件存在于同一目录下。</p>`;
            }
        }
    </script>
</body>
</html>
